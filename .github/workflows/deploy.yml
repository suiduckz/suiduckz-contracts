name: Deploy Testnet Baby Suiduckz NFT

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Debug structure (WAJIB biar keliatan)
      - name: Debug Structure
        run: |
          echo "📂 LIST FILE:"
          ls -R

      # 3. Install Sui
      - name: Install Sui
        run: |
          curl -L https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz
          tar -xvf sui.tgz
          sudo mv sui*/sui /usr/local/bin/sui
          chmod +x /usr/local/bin/sui
          sui --version

      # 4. Setup config
      - name: Setup config
        run: |
          mkdir -p ~/.sui/sui_config

          cat > ~/.sui/sui_config/client.yaml <<EOF
keystore:
  File: /home/runner/.sui/sui_config/sui.keystore
envs:
  - alias: testnet
    rpc: https://fullnode.testnet.sui.io:443
active_env: testnet
EOF

      # 5. Import wallet
      - name: Import wallet
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          sui keytool import "$PRIVATE_KEY" ed25519
          sui client active-address

      # 6. Faucet
      - name: Faucet
        run: |
          ADDR=$(sui client active-address)

          for i in {1..3}; do
            curl -X POST https://faucet.testnet.sui.io/v2/gas \
              -H "Content-Type: application/json" \
              -d "{\"FixedAmountRequest\":{\"recipient\":\"$ADDR\"}}" && break
            sleep 5
          done

      # 7. Auto find Move.toml (INI KUNCI FIX)
      - name: Find Move Project
        id: find_move
        run: |
          DIR=$(dirname $(find . -name Move.toml | head -n 1))
          echo "dir=$DIR" >> $GITHUB_OUTPUT
          echo "📦 Found Move project at: $DIR"

      # 8. Build & Deploy
      - name: Build & Deploy NFT
        run: |
          cd ${{ steps.find_move.outputs.dir }}

          echo "🔨 BUILD..."
          sui move build

          echo "🚀 DEPLOY..."
          sui client publish --gas-budget 100000000
