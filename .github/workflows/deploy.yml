name: Deploy Testnet Baby Suiduckz NFT

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Debug structure (biar keliatan kalau error lagi)
      - name: Debug Structure
        run: |
          echo "📂 PROJECT STRUCTURE:"
          ls -R

      # 3. Install Sui CLI (STABLE)
      - name: Install Sui CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          curl -L https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz
          tar -xvf sui.tgz

          sudo mv sui*/sui /usr/local/bin/sui
          chmod +x /usr/local/bin/sui

          echo "✅ Sui Installed:"
          sui --version

      # 4. Setup config TESTNET
      - name: Setup Sui Config
        run: |
          mkdir -p ~/.sui/sui_config

          cat > ~/.sui/sui_config/client.yaml <<EOF
keystore:
  File: /home/runner/.sui/sui_config/sui.keystore
envs:
  - alias: testnet
    rpc: https://fullnode.testnet.sui.io:443
active_env: testnet
EOF

      # 5. Import Wallet
      - name: Import Wallet
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          echo "🔑 Import wallet..."
          sui keytool import "$PRIVATE_KEY" ed25519

          echo "👤 Active address:"
          sui client active-address

      # 6. Faucet (retry biar stabil)
      - name: Request Faucet
        run: |
          ADDR=$(sui client active-address)
          echo "💰 Request faucet for: $ADDR"

          for i in {1..5}; do
            curl -s -X POST https://faucet.testnet.sui.io/v2/gas \
              -H "Content-Type: application/json" \
              -d "{\"FixedAmountRequest\":{\"recipient\":\"$ADDR\"}}" && break

            echo "Retry faucet ($i)..."
            sleep 5
          done

      # 7. Set WORKDIR FIX (INI YANG TADI ERROR)
      - name: Set Project Path
        run: |
          echo "📦 Moving to NFT project..."
          cd nft/testnet || (echo "❌ Folder nft/testnet tidak ditemukan" && exit 1)

      # 8. Build
      - name: Build Contract
        run: |
          cd nft/testnet

          echo "🔨 BUILD START..."
          sui move build

      # 9. Publish + Capture Package ID
      - name: Publish Contract
        run: |
          cd nft/testnet

          echo "🚀 DEPLOYING TO TESTNET..."

          OUTPUT=$(sui client publish --gas-budget 100000000)

          echo "$OUTPUT"

          PACKAGE_ID=$(echo "$OUTPUT" | grep -o '0x[a-f0-9]\{64\}' | head -n 1)

          echo "📦 PACKAGE ID: $PACKAGE_ID"

          echo "PACKAGE_ID=$PACKAGE_ID" >> $GITHUB_ENV

      # 10. Output result
      - name: Show Result
        run: |
          echo "🎉 DEPLOY SUCCESS!"
          echo "Package ID: $PACKAGE_ID"
