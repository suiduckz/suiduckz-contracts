name: Deploy Baby Suiduckz NFT (Testnet)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Install Sui CLI
      - name: Install Sui
        run: |
          sudo apt-get update
          sudo apt-get install -y curl

          curl -L https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz
          tar -xvf sui.tgz

          SUI_BIN=$(find . -type f -name "sui" | head -n 1)
          chmod +x $SUI_BIN
          sudo mv $SUI_BIN /usr/local/bin/sui

          sui --version

      # Setup config
      - name: Setup Config
        run: |
          mkdir -p ~/.sui/sui_config

          echo "keystore:" > ~/.sui/sui_config/client.yaml
          echo "  File: /home/runner/.sui/sui_config/sui.keystore" >> ~/.sui/sui_config/client.yaml
          echo "envs:" >> ~/.sui/sui_config/client.yaml
          echo "  - alias: testnet" >> ~/.sui/sui_config/client.yaml
          echo "    rpc: https://fullnode.testnet.sui.io:443" >> ~/.sui/sui_config/client.yaml
          echo "active_env: testnet" >> ~/.sui/sui_config/client.yaml

      # Import wallet
      - name: Import Wallet
        env:
          PRIVATE_KEY: ${{ secrets.SUI_PRIVATE_KEY }}
        run: |
          sui keytool import "$PRIVATE_KEY" ed25519
          echo "👤 Address:"
          sui client active-address

      # Faucet
      - name: Faucet
        run: |
          ADDR=$(sui client active-address)

          for i in 1 2 3 4 5; do
            curl -s -X POST https://faucet.testnet.sui.io/v2/gas \
              -H "Content-Type: application/json" \
              -d "{\"FixedAmountRequest\":{\"recipient\":\"$ADDR\"}}"

            echo "⏳ waiting..."
            sleep 8
          done

      # Build & Deploy
      - name: Deploy Contract
        id: deploy
        run: |
          cd nft/testnet

          echo "🔨 BUILD..."
          sui move build

          echo "🚀 DEPLOY..."
          RESULT=$(sui client publish --gas-budget 50000000)

          echo "$RESULT"

          echo "$RESULT" > result.txt

      # 🔥 EXTRACT PACKAGE + COUNTER (FIX TOTAL)
      - name: Extract IDs
        run: |
          echo "📦 EXTRACTING..."

          PACKAGE_ID=$(cat nft/testnet/result.txt | grep "PackageID" | awk '{print $2}')
          COUNTER_ID=$(cat nft/testnet/result.txt | grep "Counter" -A 2 | grep "ObjectID" | awk '{print $2}')

          echo "📦 PACKAGE ID: $PACKAGE_ID"
          echo "🔢 COUNTER ID: $COUNTER_ID"

          echo "PACKAGE_ID=$PACKAGE_ID" >> $GITHUB_ENV
          echo "COUNTER_ID=$COUNTER_ID" >> $GITHUB_ENV

      # Save output
      - name: Summary
        run: |
          echo "=============================="
          echo "🚀 DEPLOY SUCCESS"
          echo "📦 PACKAGE ID: $PACKAGE_ID"
          echo "🔢 COUNTER ID: $COUNTER_ID"
          echo "=============================="
