name: Deploy Testnet Baby Suiduckz NFT

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Sui CLI (FIX: pakai binary, bukan curl install.sui.io)
      - name: Install Sui CLI
        run: |
          sudo apt-get update
          sudo apt-get install -y curl git clang libssl-dev pkg-config

          # Download binary Sui terbaru
          curl -L https://github.com/MystenLabs/sui/releases/latest/download/sui-ubuntu-x86_64 -o sui

          # Kasih permission
          chmod +x sui

          # Pindahin ke PATH
          sudo mv sui /usr/local/bin/sui

      # 3. Check Sui version
      - name: Check Sui Version
        run: sui --version

      # 4. Setup wallet
      - name: Setup Sui Wallet
        env:
          SUI_PRIVATE_KEY: ${{ secrets.SUI_PRIVATE_KEY }}
        run: |
          sui client new-address ed25519
          sui client import --private-key $SUI_PRIVATE_KEY
          sui client switch --address $(sui client addresses | head -n 1)
          sui client active-address

      # 5. Switch ke testnet
      - name: Switch to Testnet
        run: |
          sui client switch --env testnet
          sui client active-env

      # 6. Build contract
      - name: Build Contract
        run: sui move build

      # 7. Publish contract
      - name: Publish Contract
        run: sui client publish --gas-budget 100000000
