name: Deploy Testnet Baby Suiduckz NFT

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - uses: actions/checkout@v4

      # 2. Install Sui CLI (STABLE)
      - name: Install Sui
        run: |
          curl -L https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz
          tar -xvf sui.tgz
          sudo mv sui*/sui /usr/local/bin/sui
          chmod +x /usr/local/bin/sui
          sui --version

      # 3. Setup config TESTNET
      - name: Setup config
        run: |
          mkdir -p ~/.sui/sui_config

          cat > ~/.sui/sui_config/client.yaml <<EOF
keystore:
  File: /home/runner/.sui/sui_config/sui.keystore
envs:
  - alias: testnet
    rpc: https://fullnode.testnet.sui.io:443
active_env: testnet
EOF

      # 4. Import wallet
      - name: Import wallet
        env:
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
        run: |
          sui keytool import "$PRIVATE_KEY" ed25519
          sui client active-address

      # 5. Faucet TESTNET (FIX)
      - name: Faucet
        run: |
          ADDR=$(sui client active-address)

          for i in {1..3}; do
            curl -X POST https://faucet.testnet.sui.io/v2/gas \
              -H "Content-Type: application/json" \
              -d "{\"FixedAmountRequest\":{\"recipient\":\"$ADDR\"}}" && break
            echo "Retry faucet..."
            sleep 5
          done

      # 6. Build & Deploy NFT
      - name: Build & Deploy
        run: |
          cd testnet   # pastikan folder lo bener

          echo "🔨 BUILD NFT..."
          sui move build

          echo "🚀 DEPLOY NFT..."
          sui client publish --gas-budget 100000000
